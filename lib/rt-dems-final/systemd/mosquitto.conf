# Mosquitto configuration for Smart Room Energy Management System
# Minimal config for LAN-only Raspberry Pi deployment

# MQTT listener (for Python clients — paho-mqtt)
listener 1883 0.0.0.0
protocol mqtt

# WebSocket listener (for browser dashboard — Paho JS client)
listener 9001 0.0.0.0
protocol websockets

# Allow anonymous connections (no username/password required)
# Suitable for a local LAN deployment; tighten for production
allow_anonymous true

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Persistence (retain messages across restarts)
persistence true
persistence_location ./mosquitto_data/

# Connection limits
max_connections -1
